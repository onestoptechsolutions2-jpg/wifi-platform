# =============================================================
# WiFi Marketing Platform — Nginx configuration
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
# =============================================================

# --- Backend API ---
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# --- Client Dashboard ---
server {
    listen 443 ssl http2;
    server_name app.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/app.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/wifi-platform/dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward /api/* to backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Super Admin Panel ---
server {
    listen 443 ssl http2;
    server_name admin.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/admin.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    # Restrict to your office/VPN IP
    # allow 1.2.3.4;
    # deny all;

    root /var/www/wifi-platform/admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Captive Portals (wildcard — *.wifi.yourdomain.com) ---
# Each tenant domain must have its own SSL cert provisioned via Certbot.
# Template server block — copy and fill in TENANT_DOMAIN per client:
server {
    listen 443 ssl http2;
    server_name TENANT_DOMAIN;                          # e.g. wifi.javacafe.com

    ssl_certificate     /etc/letsencrypt/live/TENANT_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TENANT_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /var/www/wifi-platform/portal/dist;
    index index.html;

    # Portal SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Portal API calls
    location /portal/ {
        proxy_pass http://127.0.0.1:3000/portal/;
        proxy_set_header Host $host;                    # backend resolves tenant from Host
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
