version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-wifi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB:       ${POSTGRES_DB:-wifi_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wifi} -d ${POSTGRES_DB:-wifi_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-wifi}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-wifi_platform}
      REDIS_URL:    redis://redis:6379

      # Portal tenant resolution fallback.
      # When the Host header doesn't match any tenant domain in the DB,
      # the middleware tries this value next.
      # Local dev: leave as "localhost" (browser hits localhost:3003 → nginx Host: localhost).
      # Production: set to your platform's portal domain, or leave empty to enforce strict matching.
      PORTAL_DEFAULT_DOMAIN: ${PORTAL_DEFAULT_DOMAIN:-localhost}

      # ── Set all of the following in Coolify → Environment Variables ──────
      #
      # Security (REQUIRED — change from defaults before going live):
      #   JWT_SECRET              min 32 chars
      #   ENCRYPTION_KEY          min 32 chars
      #
      # CORS (REQUIRED in production):
      #   ALLOWED_ORIGINS         e.g. https://dashboard.yourdomain.com,https://admin.yourdomain.com
      #
      # Billing callback URLs:
      #   BILLING_SUCCESS_URL     e.g. https://dashboard.yourdomain.com/billing?success=1
      #   BILLING_CANCEL_URL      e.g. https://dashboard.yourdomain.com/billing?cancelled=1
      #
      # Email (SendGrid):
      #   SENDGRID_API_KEY
      #   EMAIL_FROM              noreply@yourdomain.com
      #   EMAIL_FROM_NAME         WiFi Platform
      #
      # SMS primary (Twilio):
      #   TWILIO_ACCOUNT_SID
      #   TWILIO_AUTH_TOKEN
      #   TWILIO_FROM             +1234567890
      #
      # SMS fallback (Africa's Talking):
      #   AT_API_KEY
      #   AT_USERNAME
      #   AT_FROM                 (shortcode or sender ID)
      #
      # Social login:
      #   GOOGLE_CLIENT_ID
      #   FACEBOOK_APP_ID
      #   FACEBOOK_APP_SECRET
      #
      # Payment — Stripe:
      #   STRIPE_SECRET_KEY
      #   STRIPE_WEBHOOK_SECRET
      #   STRIPE_PRICE_STARTER    price_xxx
      #   STRIPE_PRICE_GROWTH     price_xxx
      #   STRIPE_PRICE_PRO        price_xxx
      #
      # Payment — Paystack:
      #   PAYSTACK_SECRET_KEY     sk_live_xxx
      #   PAYSTACK_PUBLIC_KEY     pk_live_xxx
      #
      # Payment — Flutterwave:
      #   FLW_SECRET_KEY          FLWSECK-xxx
      #   FLW_PUBLIC_KEY          FLWPUBK-xxx
      #   FLW_ENCRYPTION_KEY      (12-char key)
      #
      # Payment — M-Pesa (Daraja):
      #   MPESA_CONSUMER_KEY
      #   MPESA_CONSUMER_SECRET
      #   MPESA_SHORTCODE         (Paybill or Till)
      #   MPESA_PASSKEY
      #   MPESA_CALLBACK_URL      https://api.yourdomain.com/billing/webhook/mpesa
      #
      # Payment — Pesapal:
      #   PESAPAL_CONSUMER_KEY
      #   PESAPAL_CONSUMER_SECRET
      #   PESAPAL_IPN_URL         https://api.yourdomain.com/billing/webhook/pesapal
      #   PESAPAL_ENV             live  (or sandbox for testing)
      #
      # Seed:
      #   SUPER_ADMIN_EMAIL       admin@yourdomain.com
      #   SUPER_ADMIN_PASSWORD    (strong password)

    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma db push --accept-data-loss &&
        node dist/prisma/seed.js &&
        node dist/src/index.js
      "

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_FACEBOOK_APP_ID:  ${VITE_FACEBOOK_APP_ID:-}
    restart: unless-stopped
    ports:
      - "3003:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
